<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StepUp Prototypes</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --card: #fff;
      --text: #162032;
      --muted: #5c6a7d;
      --border: #dfe6f3;
      --primary: #365eff;
      --shadow: 0 14px 30px rgba(22, 44, 94, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 40%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
    .head { margin: 20px 0 14px; }
    .head h1 { margin: 0 0 8px; font-size: 28px; }
    .head p { margin: 0; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 18px;
      text-decoration: none;
      color: inherit;
      transition: transform .15s ease, border-color .15s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: #c9d7f5; }
    .card h2 { margin: 0 0 8px; font-size: 20px; }
    .card p { margin: 0; color: var(--muted); line-height: 1.5; }
    .pill {
      display: inline-block;
      margin-top: 14px;
      font-size: 12px;
      border: 1px solid #d8e1f5;
      border-radius: 999px;
      padding: 4px 10px;
      color: #3558bf;
      background: #f4f7ff;
    }
    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .head h1 { font-size: 24px; }
    }
    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      .wrap { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>StepUp 原型入口</h1>
      <p>包含两个独立原型：学生端与后台管理员端，页面支持电脑 / 平板 / 手机自适配。</p>
    </div>

    <div class="grid">
      <a class="card" href="./student.html">
        <h2>学生端 Prototype</h2>
        <p>上传试卷、查看 AI 分析结果和改进计划，展示学习数据概览与历史入口。</p>
        <span class="pill">student.html</span>
      </a>

      <a class="card" href="./admin.html">
        <h2>后台 Admin Prototype</h2>
        <p>学生管理、模型配置、Prompt 管理与审计日志查询等后台核心模块布局。</p>
        <span class="pill">admin.html</span>
      </a>
    </div>

    <div class="note">建议直接在浏览器分别打开两个页面，验证不同设备宽度下的布局表现。</div>
  </div>
</body>
</html>
