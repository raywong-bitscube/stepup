version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stepup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stepup_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stepup_pass}
      POSTGRES_DB: ${POSTGRES_DB:-stepup}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stepup_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stepup-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      ANALYSIS_ADAPTER: ${ANALYSIS_ADAPTER:-http}
      AI_ENDPOINT: ${AI_ENDPOINT:-}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-180}
      DB_DSN: "postgres://${POSTGRES_USER:-stepup_user}:${POSTGRES_PASSWORD:-stepup_pass}@postgres:5432/${POSTGRES_DB:-stepup}?sslmode=disable"
      STATIC_DIR: ${STATIC_DIR:-/srv/static}
      UPLOAD_DIR: ${UPLOAD_DIR:-/srv/uploads}
      # 默认含 `*`：任意浏览器 Origin（http/https）回显允许，免写死 IP。生产请在 .env 设严格白名单并去掉 `*`。
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*,http://localhost:3000,http://localhost:3001,http://localhost:8080,http://127.0.0.1:8080,http://localhost:7010,http://127.0.0.1:7010,http://localhost:7011,http://127.0.0.1:7011,http://localhost:7012,http://127.0.0.1:7012}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-admin123}
      SESSION_TTL_MINUTES: ${SESSION_TTL_MINUTES:-30}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - stepup_uploads:/srv/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mock-ai:
        condition: service_started

  frontend-student:
    build:
      context: .
      dockerfile: frontend-student/Dockerfile
    container_name: stepup-frontend-student
    restart: unless-stopped
    ports:
      - "${STUDENT_PORT:-3000}:80"
    depends_on:
      - backend

  frontend-admin:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
    container_name: stepup-frontend-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      - backend

  mock-ai:
    build:
      context: .
      dockerfile: mock-ai/Dockerfile
    container_name: stepup-mock-ai
    restart: unless-stopped
    environment:
      MOCK_AI_PORT: 8090
    ports:
      - "${MOCK_AI_PORT:-8090}:8090"

volumes:
  stepup_postgres_data:
  stepup_uploads:
