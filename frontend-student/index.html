<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StepUp Student Web</title>
  <style>
    :root { --bg:#f6f8fc; --card:#fff; --text:#1b2430; --muted:#5f6b7a; --primary:#3662ff; --border:#e4e9f2; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
    .card { background: var(--card); border:1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    h1 { margin:0 0 8px; font-size: 24px; }
    p { margin:0; color: var(--muted); line-height: 1.5; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    input, select { width:100%; padding:10px; border:1px solid var(--border); border-radius:10px; background:#fff; }
    button { border:0; border-radius:10px; padding:10px 14px; background:var(--primary); color:#fff; font-weight:600; cursor:pointer; margin-top:10px; }
    .drop { border:1px dashed #b7c6eb; border-radius:10px; padding:16px; text-align:center; color:var(--muted); margin-top:10px; }
    @media (max-width: 800px) { .row { grid-template-columns:1fr; } h1 { font-size: 21px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>StepUp 学生端</h1>
      <p>独立部署入口（Student Web），用于登录、上传试卷、查看分析与改进计划。</p>
    </div>
    <div class="card">
      <strong>上传试卷</strong>
      <div class="row">
        <select><option>科目：物理</option><option>科目：语文</option></select>
        <select><option>阶段：高中</option></select>
      </div>
      <div class="drop">拖拽 PDF/JPG/PNG 到这里，或点击选择文件</div>
      <div class="row">
        <input type="date">
        <input type="number" placeholder="试卷分数（可选）">
      </div>
      <button>提交并开始分析</button>
    </div>
  </div>
</body>
</html>
