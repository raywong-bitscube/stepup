<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StepUp Admin Web</title>
  <style>
    :root { --bg:#f5f7fb; --card:#fff; --text:#1b2430; --muted:#5f6b7a; --primary:#3158ec; --border:#e2e8f2; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 16px; }
    .card { background: var(--card); border:1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .layout { display:grid; grid-template-columns:220px 1fr; gap:12px; }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0; color: var(--muted); line-height: 1.5; }
    .menu button { display:block; width:100%; margin-bottom:8px; padding:10px; border:1px solid var(--border); border-radius:10px; background:#fff; text-align:left; cursor:pointer; }
    .menu button.active { border-color:#ced9fb; background:#f3f6ff; color:#2f4fc9; font-weight:600; }
    .kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px; }
    .kpi { border:1px solid var(--border); border-radius:10px; padding:12px; }
    .kpi .label { font-size:12px; color:var(--muted); }
    .kpi .value { margin-top:6px; font-size:22px; font-weight:700; }
    @media (max-width: 900px) { .layout { grid-template-columns:1fr; } .kpis { grid-template-columns:1fr; } h1 { font-size:21px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>StepUp 后台管理端</h1>
      <p>独立部署入口（Admin Web），用于学生管理、模型配置、Prompt 配置和审计查询。</p>
    </div>
    <div class="layout">
      <aside class="card menu">
        <button class="active">仪表盘</button>
        <button>学生管理</button>
        <button>AI 模型设置</button>
        <button>Prompt 设置</button>
        <button>Audit Log</button>
      </aside>
      <section class="card">
        <strong>系统概览</strong>
        <div class="kpis">
          <div class="kpi"><div class="label">学生总数</div><div class="value">236</div></div>
          <div class="kpi"><div class="label">试卷总数</div><div class="value">1284</div></div>
          <div class="kpi"><div class="label">今日分析任务</div><div class="value">47</div></div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
